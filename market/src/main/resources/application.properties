spring.application.name=market

spring:
    datasource:
        url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3308}/${DB_NAME:dbmarket}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
        username: ${DB_USER:appuser}
        password: ${DBMARKET_PASSWORD:app_password}
        driver-class-name: com.mysql.cj.jdbc.Driver

    hikari:
        maximum-pool-size: 10
        minimum-idle: 2
        connection-timeout: 30000
        idle-timeout: 600000
        max-lifetime: 1800000

    jpa:
        hibernate:
            ddl-auto: none
        show-sql: false
        properties:
            hibernate:
                dialect: org.hibernate.dialect.MySQL8Dialect